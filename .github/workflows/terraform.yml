name: Terraform

# Trunk-based: changes land by pushing to main. The job plans, surfaces the
# plan in the run's job summary, then applies the saved plan.
on:
  push:
    branches: [main]
    paths: ["infra/terraform/**", ".github/workflows/terraform.yml"]

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
  # The S3 backend reads AWS_* env vars; supply the Spaces keys.
  AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}

jobs:
  apply:
    name: Plan and apply
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false # so `tee` sees terraform's real exit code
      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - name: Plan
        run: terraform plan -input=false -no-color -out=tfplan | tee plan.txt
      - name: Publish plan to job summary
        run: |
          {
            echo '### Terraform Plan'
            echo '```'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # Apply the exact plan that was just shown (saved plans apply without a prompt).
      - name: Apply
        run: terraform apply -input=false tfplan
